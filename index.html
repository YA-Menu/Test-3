<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو المطعم</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; padding: 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .menu-item { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .menu-item img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .menu-item h3 { margin: 10px 0 5px; color: #333; }
        .menu-item p { color: #666; font-size: 14px; }
        .menu-item .price { font-weight: bold; color: #e63946; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">قائمة الطعام</h1>
    <div class="menu-grid" id="menu-container">
        </div>

    <script>
        // الصق الرابط اللي نسخته من جوجل شيت بين علامتين التنصيص
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1WoWB5ADcTLKOGHex26UnNayel-sQljwf7miuQ07Dxb0/export?format=csv';

        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const items = results.data;
                const container = document.getElementById('menu-container');
                
                items.forEach(item => {
                    // إذا السطر فاضي بالإكسل يتجاهله
                    if(!item['الاسم']) return; 
                    
                    const dish = document.createElement('div');
                    dish.className = 'menu-item';
                    dish.innerHTML = `
                        <img src="${item['الصورة']}" alt="${item['الاسم']}">
                        <h3>${item['الاسم']}</h3>
                        <p>${item['الوصف']}</p>
                        <div class="price">${item['السعر']}</div>
                    `;
                    container.appendChild(dish);
                });
            }
        });
    </script>
</body>
</html>
